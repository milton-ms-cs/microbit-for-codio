name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Package release archive
        run: tar -czf microbit-tools-${{ github.ref_name }}.tar.gz dist stack
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: microbit-tools-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
